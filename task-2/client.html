<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Real-time Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
    --bg:        #0d0f14;
    --surface:   #141720;
    --surface2:  #1c2030;
    --border:    #252a3a;
    --accent:    #5b8dee;
    --accent2:   #3ecf8e;
    --warn:      #f7b731;
    --danger:    #fc5c65;
    --text:      #e2e8f7;
    --muted:     #6b7394;
    --dm-color:  #a29bfe;
    --radius:    10px;
    --mono:      'Space Mono', monospace;
    --sans:      'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── Header ── */
header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}
.logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
}
.status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
}
.status-dot.live { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
#header-room {
    margin-left: auto;
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--muted);
}

/* ── Layout ── */
.shell {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
}
.sidebar-label {
    font-size: .65rem;
    font-family: var(--mono);
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
}

.input-row {
    display: flex;
    gap: 6px;
}
input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: .875rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color .2s;
}
input[type="text"]::placeholder { color: var(--muted); }
input[type="text"]:focus { border-color: var(--accent); }

button {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    font-family: var(--mono);
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 8px 14px;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
}
button:hover  { opacity: .88; }
button:active { transform: scale(.97); }
button.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
}
button.ghost:hover { border-color: var(--accent); color: var(--accent); }
button.danger { background: var(--danger); }
button.green  { background: var(--accent2); color: #0d0f14; }

/* Presence list */
.presence-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
}
.presence-list::-webkit-scrollbar { width: 4px; }
.presence-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.presence-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: .875rem;
    animation: fadeIn .3s ease;
}
.p-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
}
.p-dot.online  { background: var(--accent2); }
.p-dot.away    { background: var(--warn); }
.p-dot.offline { background: var(--muted); }
.p-name { flex: 1; }
.p-badge {
    font-family: var(--mono);
    font-size: .6rem;
    color: var(--muted);
    letter-spacing: 1px;
}

/* Search results in sidebar */
.search-results {
    padding: 12px 16px;
    overflow-y: auto;
    max-height: 220px;
    border-top: 1px solid var(--border);
}
.search-results::-webkit-scrollbar { width: 4px; }
.search-results::-webkit-scrollbar-thumb { background: var(--border); }
.search-hit {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: .8rem;
}
.search-hit:last-child { border-bottom: none; }
.search-hit .sh-sender { color: var(--accent); font-weight: 600; }
.search-hit .sh-ts { color: var(--muted); font-size: .7rem; font-family: var(--mono); }

/* ── Main chat area ── */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── Login overlay ── */
#login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
.login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 48px;
    text-align: center;
    min-width: 320px;
    animation: scaleIn .4s cubic-bezier(.22,1,.36,1);
    }
.login-box h2 {
    font-family: var(--mono);
    letter-spacing: 6px;
    color: var(--accent);
    margin-bottom: 6px;
    font-size: 1.5rem;
}
.login-box p { color: var(--muted); font-size: .875rem; margin-bottom: 24px; }
.login-box input { width: 100%; margin-bottom: 12px; text-align: center; font-size: 1rem; padding: 12px; }
.login-box button { width: 100%; padding: 12px; font-size: .9rem; }

/* ── Messages ── */
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-row {
    display: flex;
    flex-direction: column;
    animation: fadeIn .25s ease;
    padding: 3px 0;
}
.msg-row.mine { align-items: flex-end; }

.msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
}
.msg-row.mine .msg-header { flex-direction: row-reverse; }

.msg-sender {
    font-size: .75rem;
    font-weight: 600;
    color: var(--accent);
    font-family: var(--mono);
}
.msg-row.mine .msg-sender { color: var(--accent2); }
.msg-ts {
    font-size: .65rem;
    color: var(--muted);
    font-family: var(--mono);
}

.msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px 12px 12px 2px;
    padding: 8px 14px;
    max-width: 72%;
    font-size: .9rem;
    line-height: 1.5;
word-break: break-word;
}
.msg-row.mine .msg-bubble {
    background: #1e2d52;
    border-color: #2a4080;
    border-radius: 12px 12px 2px 12px;
}
.msg-bubble.dm-bubble {
    background: #241e40;
    border-color: var(--dm-color);
    color: var(--dm-color);
}
.msg-bubble.system-bubble {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: .78rem;
    font-style: italic;
}

/* ── Typing indicator ── */
#typing-area {
    min-height: 22px;
    padding: 0 24px 6px;
    font-size: .78rem;
    color: var(--muted);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 8px;
}
.typing-dots span {
    display: inline-block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce .8s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }

/* ── Input bar ── */
.input-bar {
    display: flex;
    gap: 10px;
    padding: 25px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}
#msg-input {
    flex: 1;
    font-size: .9rem;
    padding: 10px 16px;
    border-radius: 24px;
}
#send-btn { border-radius: 24px; padding: 10px 20px; }

/* ── DM panel ── */
.dm-panel {
padding: 16px;
border-top: 1px solid var(--border);
background: var(--surface);
}
.dm-panel .sidebar-label { margin-bottom: 8px; }
.dm-row { display: flex; gap: 6px; }
.dm-row input { font-size: .8rem; }

/* ── Search panel ── */
.search-panel {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
}

/* ── Error toast ── */
#toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--danger);
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: .875rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 100;
    font-family: var(--mono);
}
#toast.show { opacity: 1; }

/* ── Animations ── */
@keyframes fadeIn   { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes scaleIn  { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: none; } }
@keyframes bounce   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
</style>
</head>
<body>
<div id="login-overlay">
  <div class="login-box">
    <h2>RELAY</h2>
    <p>Real-time chat - enter a username to begin</p>
    <input type="text" id="login-username" placeholder="your username" maxlength="24" />
    <button class="green" onclick="connect()">Connect</button>
  </div>
</div>

<!-- ── Header ── -->
<header>
  <span class="logo">RELAY</span>
  <span class="status-dot" id="status-dot"></span>
  <span id="header-room">not connected</span>
</header>

<!-- ── Shell ── -->
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Join room -->
    <div class="sidebar-section">
      <div class="sidebar-label">Channel</div>
      <div class="input-row">
        <input type="text" id="room-input" placeholder="room name" />
        <button onclick="joinRoom()">JOIN</button>
      </div>
    </div>

    <!-- Search -->
    <div class="sidebar-section search-panel">
      <div class="sidebar-label">Search</div>
      <div class="input-row">
        <input type="text" id="search-input" placeholder="keyword" onkeydown="if(event.key==='Enter')searchMessages()" />
        <button class="ghost" onclick="searchMessages()">GO</button>
      </div>
    </div>

    <!-- Search results -->
    <div class="search-results" id="search-results" style="display:none"></div>

    <!-- Presence -->
    <div class="sidebar-label" style="padding:12px 16px 4px; flex-shrink:0;">Members</div>
    <div class="presence-list" id="presence-list">
      <div style="color:var(--muted);font-size:.8rem;">Join a room to see members.</div>
    </div>

    <!-- DM panel -->
    <div class="dm-panel">
      <div class="sidebar-label">Direct Message</div>
      <div class="dm-row">
        <input type="text" id="dm-to" placeholder="username" />
        <button class="ghost" onclick="sendDM()" title="Send DM">DM</button>
      </div>
    </div>

  </aside>

  <!-- Main -->
  <div class="main">
    <div id="messages"></div>
    <div id="typing-area"></div>
    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="Message"
             oninput="handleTyping()"
             onkeydown="if(event.key==='Enter')sendMessage()" />
      <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ws = null;
let myUsername = '';
let currentRoom = '';
let typingTimer = null;
let isTyping   = false;
const typingUsers = new Set();

// ── Utility ────────────────────────────────────────────────────────────────
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function ts() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── Message rendering ──────────────────────────────────────────────────────
function appendMessage({ sender, message, time, type='message' }) {
  const el = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (sender === myUsername ? ' mine' : '');

  if (type === 'system') {
    row.innerHTML = `<div class="msg-bubble system-bubble">${message}</div>`;
    el.appendChild(row);
    scrollBottom();
    return;
  }

  const isDM = type === 'dm';
  row.innerHTML = `
    <div class="msg-header">
      <span class="msg-sender">${isDM ? 'DM ' : ''}${sender}</span>
      <span class="msg-ts">${time || ts()}</span>
    </div>
    <div class="msg-bubble ${isDM ? 'dm-bubble' : ''}">${escHtml(message)}</div>
  `;
  el.appendChild(row);
  scrollBottom();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Presence ───────────────────────────────────────────────────────────────
function renderPresence(users) {
  const el = document.getElementById('presence-list');
  if (!users.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:.8rem;">No members.</div>';
    return;
  }
  el.innerHTML = users.map(u => `
    <div class="presence-item">
      <span class="p-dot ${u.status}"></span>
      <span class="p-name">${escHtml(u.user)}</span>
      <span class="p-badge">${u.status}</span>
    </div>
  `).join('');
}

// ── Typing indicator ───────────────────────────────────────────────────────
function renderTyping() {
  const el = document.getElementById('typing-area');
  if (!typingUsers.size) { el.innerHTML = ''; return; }

  const names = [...typingUsers].join(', ');
  el.innerHTML = `
    <span>${names} ${typingUsers.size === 1 ? 'is' : 'are'} typing</span>
    <span class="typing-dots"><span></span><span></span><span></span></span>
  `;
}

// ── Connect ────────────────────────────────────────────────────────────────
function connect() {
  const uInput = document.getElementById('login-username');
  const username = uInput.value.trim().toLowerCase();
  if (!username) { showToast('Enter a username'); return; }

  myUsername = username;
  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ username }));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };

  ws.onclose = () => {
    document.getElementById('status-dot').classList.remove('live');
    document.getElementById('header-room').textContent = 'disconnected';
    showToast('Disconnected from server');
  };

  ws.onerror = () => showToast('WebSocket error');
}

function handleMessage(data) {
  switch (data.type) {

    case 'connected':
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('status-dot').classList.add('live');
      document.getElementById('header-room').textContent = `${data.username}`;
      setInterval(pingPresence, 15000);
      break;

    case 'history':
      document.getElementById('messages').innerHTML = '';
      data.messages.forEach(m => appendMessage({ sender: m.sender, message: m.message, time: m.timestamp }));
      break;

    case 'message':
      appendMessage(data);
      break;

    case 'dm':
      appendMessage({ ...data, sender: data.from, type: 'dm' });
      break;

    case 'presence':
      appendMessage({ type: 'system', message: data.message });
      break;

    case 'presence_list':
      renderPresence(data.users);
      document.getElementById('header-room').textContent =
        `${currentRoom}  .  ${data.count} member${data.count !== 1 ? 's' : ''}`;
      break;

    case 'typing':
      typingUsers.add(data.user);
      renderTyping();
      break;

    case 'stop_typing':
      typingUsers.delete(data.user);
      renderTyping();
      break;

    case 'search_results':
      renderSearchResults(data.results, data.keyword);
      break;

    case 'error':
      showToast(data.message);
      break;
  }
}

// ── Room ───────────────────────────────────────────────────────────────────
function joinRoom() {
  const room = document.getElementById('room-input').value.trim().toLowerCase();
  if (!room) { showToast('Enter a room name'); return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { showToast('Not connected'); return; }

  currentRoom = room;
  typingUsers.clear();
  renderTyping();
  document.getElementById('messages').innerHTML = '';

  ws.send(JSON.stringify({ action: 'join', room }));
}

// ── Send message ───────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg || !ws || ws.readyState !== WebSocket.OPEN) return;

  ws.send(JSON.stringify({ action: 'message', message: msg }));
  input.value = '';
  stopTyping();
}

// ── Typing ─────────────────────────────────────────────────────────────────
function handleTyping() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (!isTyping) {
    ws.send(JSON.stringify({ action: 'typing' }));
    isTyping = true;
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (isTyping && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'stop_typing' }));
  }
  isTyping = false;
  clearTimeout(typingTimer);
}

// ── DM ─────────────────────────────────────────────────────────────────────
function sendDM() {
  const toUser = document.getElementById('dm-to').value.trim().toLowerCase();
  const msg    = document.getElementById('msg-input').value.trim();
  if (!toUser || !msg) { showToast('Fill in username and message'); return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { showToast('Not connected'); return; }

  ws.send(JSON.stringify({ action: 'dm', to: toUser, message: msg }));
  document.getElementById('msg-input').value = '';
  stopTyping();
}

// ── Search ─────────────────────────────────────────────────────────────────
function searchMessages() {
  const keyword = document.getElementById('search-input').value.trim();
  if (!keyword) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) { showToast('Not connected'); return; }
  ws.send(JSON.stringify({ action: 'search', keyword }));
}

function renderSearchResults(results, keyword) {
  const el = document.getElementById('search-results');

  if (!results.length) {
    el.style.display = 'block';
    el.innerHTML = `<div style="color:var(--muted);font-size:.8rem;">No results for "${escHtml(keyword)}"</div>`;
    return;
  }

  el.style.display = 'block';
  el.innerHTML = `
    <div class="sidebar-label" style="margin-bottom:6px;">Results for "${escHtml(keyword)}"</div>
    ${results.map(r => `
      <div class="search-hit">
        <span class="sh-sender">${escHtml(r.sender)}</span>
        <span class="sh-ts"> · ${r.timestamp}</span>
        <div>${escHtml(r.message)}</div>
      </div>
    `).join('')}
  `;
}

// ── Presence ping ──────────────────────────────────────────────────────────
function pingPresence() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'ping' }));
  }
}

// ── Enter key for login ────────────────────────────────────────────────────
document.getElementById('login-username').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});
</script>
</body>
</html>
